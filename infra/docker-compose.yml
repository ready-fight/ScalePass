services:
  postgres:
    image: postgres:16
    container_name: scalepass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scalepass
      POSTGRES_PASSWORD: scalepass
      POSTGRES_DB: scalepass
    ports:
      - "5432:5432"
    volumes:
      - scalepass_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: scalepass-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - scalepass_redis_data:/data

volumes:
  scalepass_postgres_data:
  scalepass_redis_data: